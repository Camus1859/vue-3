<!doctype html>
<html lang="en">
  <head>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Title</title>
  </head>
  <body>
    <div id="app">
      <h1>{{message}}</h1>
    </div>
  </body>
  <script>
    const { createApp } = Vue;
    createApp({
      setup() {
        return {
          message: "Hell from Vue 3!",
        };
      },
    }).mount("#app");
  </script>
</html>
